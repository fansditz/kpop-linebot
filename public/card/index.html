<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日抽卡</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: #25222a;
      background:
        radial-gradient(circle at top left, rgba(255, 160, 190, 0.32), transparent 32rem),
        linear-gradient(135deg, #f8eef6 0%, #edf7ff 45%, #fff7e6 100%);
    }

    main {
      width: min(92vw, 420px);
      padding: 28px 20px 36px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0;
    }

    #status-text {
      min-height: 3rem;
      margin: 0 0 24px;
      color: #5d5666;
      line-height: 1.5;
    }

    .card-container {
      width: min(76vw, 300px);
      aspect-ratio: 2 / 3;
      margin: 0 auto 26px;
      perspective: 1000px;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer;
      box-shadow: 0 18px 38px rgba(95, 67, 93, 0.22);
    }

    .card.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 6px solid #ffffff;
      border-radius: 16px;
      backface-visibility: hidden;
      background: #ffffff;
    }

    .card-back {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.26), transparent),
        linear-gradient(135deg, #e76f9f, #7db7e8);
    }

    .logo {
      width: 132px;
      height: 132px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      color: #ffffff;
      font-size: 3.4rem;
      font-weight: 800;
    }

    .card-front {
      transform: rotateY(180deg);
      align-items: flex-end;
    }

    .card-front img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-info {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      color: #25222a;
    }

    #card-name {
      margin: 0 0 4px;
      font-weight: 800;
      font-size: 1.2rem;
    }

    #card-message {
      margin: 0;
      color: #5d5666;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .btn {
      min-width: 160px;
      border: 0;
      border-radius: 999px;
      padding: 13px 28px;
      color: #ffffff;
      background: #d94f86;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(217, 79, 134, 0.3);
    }

    .btn:disabled {
      background: #cfc9d2;
      color: #746f78;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>今日抽卡</h1>
    <p id="status-text">今天會抽到哪一張小卡呢？點一下開始。</p>

    <div class="card-container">
      <div class="card" id="card" role="button" tabindex="0" aria-label="抽卡">
        <div class="card-face card-back">
          <div class="logo">K</div>
        </div>
        <div class="card-face card-front">
          <img id="card-img" src="" alt="今日小卡">
          <div class="card-info">
            <p id="card-name">尚未抽卡</p>
            <p id="card-message">點擊下方按鈕開始。</p>
          </div>
        </div>
      </div>
    </div>

    <button class="btn" id="draw-btn" type="button">開始抽卡</button>
  </main>

  <script>
    const idolDatabase = [
      { artist: "TWICE", member: "Nayeon", image: "./image/娜連.jpg", message: "今天的幸運感是明亮開場，適合把想做的事先推進一步。" },
      { artist: "TWICE", member: "Jeongyeon", image: "./image/定延.jpg", message: "穩穩地做完一件小事，就會比想像中更靠近目標。" },
      { artist: "TWICE", member: "Momo", image: "./image/momo.jpeg", message: "今天適合動起來，節奏會把心情帶回正軌。" },
      { artist: "TWICE", member: "Sana", image: "./image/sana.jpg", message: "柔軟一點也很好，你的可愛能量今天很有用。" },
      { artist: "TWICE", member: "Jihyo", image: "./image/志效.jpg", message: "把主導權拿回來，今天很適合做一個乾脆的決定。" },
      { artist: "TWICE", member: "Mina", image: "./image/mina.jpg", message: "安靜專注會帶來好結果，照自己的步調就好。" },
      { artist: "TWICE", member: "Dahyun", image: "./image/多賢.jpg", message: "今天的關鍵字是輕盈，別忘了給自己一點空白。" },
      { artist: "TWICE", member: "Chaeyoung", image: "./image/彩英.jpg", message: "靈感會在不經意時出現，記得把想法留下來。" },
      { artist: "TWICE", member: "Tzuyu", image: "./image/子瑜.jpg", message: "慢慢來也很有力量，今天適合把事情做得漂亮。" }
    ];

    const card = document.getElementById("card");
    const cardImg = document.getElementById("card-img");
    const cardName = document.getElementById("card-name");
    const cardMessage = document.getElementById("card-message");
    const drawBtn = document.getElementById("draw-btn");
    const statusText = document.getElementById("status-text");

    function getTodayDateString() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function showIdol(idol) {
      cardImg.src = idol.image;
      cardName.innerText = `${idol.artist} ${idol.member}`;
      cardMessage.innerText = idol.message;
      card.classList.add("is-flipped");
    }

    function restoreTodayCard() {
      const lastDrawDate = localStorage.getItem("lastDrawDate");
      const todayDate = getTodayDateString();
      const savedIdol = JSON.parse(localStorage.getItem("lastDrawIdol") || "null");

      if (lastDrawDate === todayDate && savedIdol) {
        showIdol(savedIdol);
        drawBtn.disabled = true;
        statusText.innerText = "你今天已經抽過了，明天再來抽新的小卡。";
      }
    }

    function drawCard() {
      const todayDate = getTodayDateString();
      const lastDrawDate = localStorage.getItem("lastDrawDate");

      if (lastDrawDate === todayDate) {
        alert("今天已經抽過一次了，明天再來。");
        return;
      }

      const luckyIdol = idolDatabase[Math.floor(Math.random() * idolDatabase.length)];
      showIdol(luckyIdol);

      localStorage.setItem("lastDrawDate", todayDate);
      localStorage.setItem("lastDrawIdol", JSON.stringify(luckyIdol));

      drawBtn.disabled = true;
      statusText.innerText = "抽卡完成，這就是你今天的小卡。";
    }

    drawBtn.addEventListener("click", drawCard);
    card.addEventListener("click", drawCard);
    card.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        drawCard();
      }
    });

    restoreTodayCard();
  </script>
</body>
</html>
